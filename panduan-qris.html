<html lang="id">

    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

    :root {
      --bg-deep: #0b0e14;
      --bg-base: #111520;
      --bg-card: #171c2e;
      --bg-card-hover: #1d2340;
      --bg-elevated: #222842;
      --accent: #00d2c6;
      --accent-dim: rgba(0,210,198,0.12);
      --accent-glow: rgba(0,210,198,0.25);
      --accent-2: #7c6aef;
      --accent-2-dim: rgba(124,106,239,0.12);
      --text: #e8eaf0;
      --text-secondary: #8891a5;
      --text-muted: #565e72;
      --border: rgba(255,255,255,0.06);
      --border-accent: rgba(0,210,198,0.3);
      --danger: #ff6b6b;
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Subtle dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Top Bar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11,14,20,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
    }
    .topbar-inner {
      max-width: 1120px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      height: 60px;
      gap: 1.5rem;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }
    .topbar-brand .logo-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-size: 14px;
      color: var(--bg-deep);
      font-weight: 700;
    }
    .topbar-brand span {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .topbar-search {
      flex: 1;
      max-width: 360px;
      position: relative;
    }
    .topbar-search input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.75rem 0.5rem 2.25rem;
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      transition: border-color 0.2s;
    }
    .topbar-search input::placeholder { color: var(--text-muted); }
    .topbar-search input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .topbar-search i {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .topbar-meta {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .topbar-meta .count-badge {
      background: var(--accent-dim);
      color: var(--accent);
      padding: 0.15rem 0.55rem;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.75rem;
    }

    /* ── Main layout ── */
    .main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 1.75rem 2rem 3rem;
      position: relative;
      z-index: 1;
    }

    /* ── Page header ── */
    .page-header {
      margin-bottom: 1.75rem;
    }
    .page-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.35rem;
    }
    .page-header h1 .highlight {
      color: var(--accent);
    }
    .page-header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    /* ── Tabs ── */
    .tab-row {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .tab-item {
      padding: 0.65rem 1.25rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .tab-item::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0; right: 0;
      height: 2px;
      background: transparent;
      border-radius: 2px 2px 0 0;
      transition: background 0.2s;
    }
    .tab-item.active {
      color: var(--accent);
    }
    .tab-item.active::after {
      background: var(--accent);
    }
    .tab-item:hover:not(.active) {
      color: var(--text-secondary);
    }
    .tab-item .tab-count {
      font-size: 0.7rem;
      background: var(--bg-elevated);
      color: var(--text-secondary);
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      font-weight: 500;
    }
    .tab-item.active .tab-count {
      background: var(--accent-dim);
      color: var(--accent);
    }

    /* ── Card grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 0.85rem;
    }

    /* ── Card ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
    }
    .card:hover {
      border-color: rgba(255,255,255,0.1);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      transform: translateY(-2px);
    }
    .card-head {
      display: flex;
      align-items: center;
      padding: 0.85rem 1rem;
      gap: 0.85rem;
      cursor: pointer;
      user-select: none;
    }
    .card-icon {
      width: 42px; height: 42px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      background: var(--bg-elevated);
      flex-shrink: 0;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .card-type {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .card-toggle {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      color: var(--text-muted);
      font-size: 0.7rem;
      transition: all 0.25s;
      flex-shrink: 0;
    }
    .card.open .card-toggle {
      background: var(--accent);
      color: var(--bg-deep);
      border-color: var(--accent);
      transform: rotate(180deg);
    }

    /* ── Card body (expandable) ── */
    .card-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card.open .card-body {
      max-height: 2500px;
    }
    .card-body-inner {
      padding: 0 1rem 1rem;
      border-top: 1px solid var(--border);
    }

    /* ── Steps ── */
    .steps-label {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin: 1rem 0 0.75rem;
    }
    .step-list {
      list-style: none;
      counter-reset: s;
    }
    .step-list li {
      counter-increment: s;
      display: flex;
      gap: 0.75rem;
      padding: 0.6rem 0;
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.55;
      border-bottom: 1px solid var(--border);
    }
    .step-list li:last-child { border-bottom: none; }
    .step-list li::before {
      content: counter(s);
      flex-shrink: 0;
      width: 22px; height: 22px;
      border-radius: 6px;
      background: var(--bg-elevated);
      color: var(--accent);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      display: grid;
      place-items: center;
      margin-top: 2px;
    }

    /* ── Preview image ── */
    .preview-wrap {
      margin-top: 1rem;
      text-align: center;
    }
    .preview-wrap img {
      max-width: 100%;
      max-height: 260px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .preview-wrap img:hover { opacity: 0.85; }
    .preview-hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.85rem;
    }
    .btn {
      flex: 1;
      padding: 0.6rem 1rem;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: all 0.2s;
    }
    .btn-accent {
      background: var(--accent);
      color: var(--bg-deep);
    }
    .btn-accent:hover { filter: brightness(1.15); }
    .btn-ghost {
      background: var(--bg-elevated);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      background: var(--bg-card-hover);
      color: var(--text);
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      backdrop-filter: blur(6px);
    }
    .modal-overlay.show { display: flex; }
    .modal-overlay img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .modal-close {
      position: fixed;
      top: 1rem; right: 1rem;
      width: 36px; height: 36px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background 0.2s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.15); }

    /* ── Toast ── */
    .toast-msg {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border-accent);
      padding: 0.7rem 1.25rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 2000;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      opacity: 0;
      animation: toastSlide 0.35s ease forwards;
    }
    .toast-msg.out {
      animation: toastOut 0.3s ease forwards;
    }
    @keyframes toastSlide {
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes toastOut {
      to { opacity: 0; transform: translateX(-50%) translateY(20px); }
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 2rem 0 1.5rem;
      color: var(--text-muted);
      font-size: 0.78rem;
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .topbar { padding: 0 1rem; }
      .topbar-inner { gap: 0.75rem; }
      .topbar-brand span { display: none; }
      .topbar-meta { display: none; }
      .topbar-search { max-width: none; }
      .main { padding: 1.25rem 1rem 2rem; }
      .page-header h1 { font-size: 1.3rem; }
      .card-grid { grid-template-columns: 1fr; }
      .btn-row { flex-direction: column; }
      .tab-item { padding: 0.55rem 0.85rem; font-size: 0.82rem; }
    }
  </style>
</head>

// ═══════ RENDER ═══════
function buildCard(item) {
  return `
    <div class="card" data-name="${item.name}" data-title="${item.title}">
      <div class="card-head" onclick="toggle(this)">
        <img src="${item.icon}" alt="${item.title}" class="card-icon" loading="lazy">
        <div class="card-info">
          <div class="card-name">${item.title}</div>
          <div class="card-type">${item.subtitle}</div>
        </div>
        <div class="card-toggle"><i class="fas fa-chevron-down"></i></div>
      </div>
      <div class="card-body">
        <div class="card-body-inner">
          <span class="steps-label">Langkah-langkah</span>
          <ol class="step-list">
            ${item.steps.map(s => `<li>${s}</li>`).join('')}
          </ol>
          <div class="preview-wrap">
            <img src="${item.image}" alt="Bukti" loading="lazy" onclick="openModal('${item.image}')">
            <div class="preview-hint"><i class="fas fa-search-plus"></i> Klik gambar untuk memperbesar</div>
          </div>
          <div class="btn-row">
            <button class="btn btn-accent" onclick="copySteps('${item.name}')"><i class="fas fa-copy"></i> Salin Panduan</button>
            <button class="btn btn-ghost" onclick="copyImage('${item.image}')"><i class="fas fa-image"></i> Salin Gambar</button>
          </div>
        </div>
      </div>
    </div>`;
}

const eGrid = document.getElementById('ewallet-grid');
const bGrid = document.getElementById('bank-grid');
eGrid.innerHTML = eWalletData.map(buildCard).join('');
bGrid.innerHTML = bankData.map(buildCard).join('');

// ═══════ INTERACTIONS ═══════
function toggle(el) {
  el.closest('.card').classList.toggle('open');
}

// Tabs
document.querySelectorAll('.tab-item').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const t = btn.dataset.tab;
    eGrid.style.display = t === 'ewallet' ? 'grid' : 'none';
    bGrid.style.display = t === 'bank' ? 'grid' : 'none';
    document.getElementById('searchInput').value = '';
    filterCards();
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', filterCards);
function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const tab = document.querySelector('.tab-item.active').dataset.tab;
  const container = tab === 'ewallet' ? eGrid : bGrid;
  let visible = 0;
  container.querySelectorAll('.card').forEach(c => {
    const match = c.dataset.name.toLowerCase().includes(q) || c.dataset.title.toLowerCase().includes(q);
    c.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  document.getElementById('totalCount').textContent = visible;
}

// Copy steps
function copySteps(appName) {
  const all = [...eWalletData, ...bankData];
  const app = all.find(i => i.name === appName);
  if (!app) return toast('Data tidak ditemukan');
  const txt = `Langkah-langkah Mengecek Bukti Transaksi QRIS ${app.title}\n\n` +
    app.steps.map((s,i) => `${i+1}. ${s}`).join('\n');
  navigator.clipboard.writeText(txt)
    .then(() => toast('Panduan berhasil disalin!'))
    .catch(() => toast('Gagal menyalin teks'));
}

// Copy image
async function copyImage(url) {
  try {
    const r = await fetch(url);
    const b = await r.blob();
    await navigator.clipboard.write([new ClipboardItem({[b.type]: b})]);
    toast('Gambar berhasil disalin');
  } catch {
    toast('Browser tidak mendukung, buka gambar manual');
    window.open(url, '_blank');
  }
}

// Modal
function openModal(src) {
  document.getElementById('modalImg').src = src;
  document.getElementById('imgModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('imgModal').classList.remove('show');
  document.body.style.overflow = '';
}
document.getElementById('imgModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Toast
function toast(msg) {
  const old = document.querySelector('.toast-msg');
  if (old) old.remove();
  const el = document.createElement('div');
  el.className = 'toast-msg';
  el.innerHTML = `<i class="fas fa-check-circle" style="color:var(--accent)"></i> ${msg}`;
  document.body.appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 300); }, 2800);
}

// Init count
filterCards();
</script>
